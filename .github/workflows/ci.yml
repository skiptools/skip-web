name: skip-web
on:
  push:
    branches: [ main ]
    tags: "[0-9]+.[0-9]+.[0-9]+"
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

jobs:
  call-workflow:
    uses: skiptools/actions/.github/workflows/skip-framework.yml@v1
    with:
      # macos-15-intel runners can lack concrete iOS simulator devices,
      # which breaks the reusable workflow's fixed simulator selection.
      runs-on: "['macos-15']"
